<!DOCTYPE html>

<head>

    <title>Header Trialing #2</title>
    <style>
        :root {
            --accent: #C8A96E;
            --bg: #F7F5F0;
            --text: #1A1A1A;
            --muted: #888;
            --nav-height: 72px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
        }

        /* ── Navbar shell ─────────────────────────────── */
        .navbar {
            background: var(--bg) !important;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            height: var(--nav-height);
            padding: 0 2rem;
            position: relative;
        }

        /* Gold accent bar along the top */
        .navbar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #e8c98e, var(--accent));
        }

        /* ── Brand ────────────────────────────────────── */
        .navbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.45rem;
            color: var(--text) !important;
            letter-spacing: -0.02em;
            line-height: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .navbar-brand .brand-sub {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
        }

        /* ── Nav links ────────────────────────────────── */
        .navbar-nav .nav-link {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted) !important;
            padding: 0.3rem 1rem !important;
            position: relative;
            transition: color 0.2s ease;
        }

        .navbar-nav .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 1rem; right: 1rem;
            height: 1px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.25s ease;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: var(--text) !important;
        }

        .navbar-nav .nav-link:hover::after,
        .navbar-nav .nav-link.active::after {
            transform: scaleX(1);
        }

        /* ── Divider dots between links ───────────────── */
        .navbar-nav .nav-item + .nav-item .nav-link::before {
            content: '·';
            position: absolute;
            left: 0;
            color: rgba(0,0,0,0.2);
            font-size: 1rem;
            top: 50%;
            transform: translateY(-50%);
        }

        /* ── Toggler (mobile) ─────────────────────────── */
        .navbar-toggler {
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 2px;
            padding: 6px 10px;
        }

        .navbar-toggler:focus {
            box-shadow: none;
        }

        .toggler-bar {
            display: block;
            width: 20px;
            height: 1.5px;
            background: var(--text);
            margin: 4px 0;
            transition: all 0.25s ease;
        }

        /* ── Demo body content ────────────────────────── */
        .demo-content {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--nav-height));
            flex-direction: column;
            gap: 1rem;
            color: var(--muted);
        }

        .demo-content h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .demo-content p {
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
